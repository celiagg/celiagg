name: Build wheels and archive

on:
- pull_request
- workflow_dispatch

jobs:
  build-wheel-all:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out the release commit
      uses: actions/checkout@v5

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        platforms: arm64
      if: runner.os == 'Linux'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build wheels (macOS)
      uses: pypa/cibuildwheel@v3.1.4
      env:
        CELIAGG_NO_TEXT_RENDERING: 1
      if: matrix.os == 'macos-latest'

    - name: Build wheels (!macOS)
      uses: pypa/cibuildwheel@v3.1.4
      if: matrix.os != 'macos-latest'

    - name: Archive build
      uses: actions/upload-artifact@v4
      with:
        name: wheels
        path: wheelhouse
        # don't need these kept for long
        retention-days: 7
